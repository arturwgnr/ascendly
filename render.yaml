services:
  - type: web
    name: ascendly-server
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ascendly-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://ascendly.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: ascendly-db
    databaseName: ascendly
    user: ascendly
